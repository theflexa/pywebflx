site_name: PyWebFlx
site_description: Browser automation for already-open Chrome pages, inspired by UiPath
site_url: https://theflexa.github.io/pywebflx/
repo_url: https://github.com/theflexa/pywebflx
repo_name: theflexa/pywebflx

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Instalacao: installation.md
  - API:
    - use_browser: api/browser.md
    - Interacao: api/interaction.md
    - Extracao: api/extraction.md
    - Inspect: api/inspect.md
    - Navegacao: api/navigation.md
    - Sincronizacao: api/synchronization.md
    - JavaScript: api/javascript.md
    - Configuracao: api/config.md
    - Excecoes: api/exceptions.md
  - Exemplos:
    - Web Scraping: examples/scraping.md
    - Automacao RPA: examples/rpa.md
