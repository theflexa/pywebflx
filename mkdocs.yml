site_name: PyWebFlx
site_description: Browser automation for already-open Chrome pages
site_url: https://theflexa.github.io/pywebflx/
repo_url: https://github.com/theflexa/pywebflx
repo_name: theflexa/pywebflx

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: pt
          name: Português
          build: true
          nav_translations:
            Home: Início
            Installation: Instalação
            API: API
            Interaction: Interação
            Extraction: Extração
            Navigation: Navegação
            Synchronization: Sincronização
            Configuration: Configuração
            Exceptions: Exceções
            Examples: Exemplos
            Web Scraping: Web Scraping
            RPA Automation: Automação RPA

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - API:
    - use_browser: api/browser.md
    - Interaction: api/interaction.md
    - Extraction: api/extraction.md
    - Inspect: api/inspect.md
    - Navigation: api/navigation.md
    - Synchronization: api/synchronization.md
    - JavaScript: api/javascript.md
    - Configuration: api/config.md
    - Exceptions: api/exceptions.md
  - Examples:
    - Web Scraping: examples/scraping.md
    - RPA Automation: examples/rpa.md
